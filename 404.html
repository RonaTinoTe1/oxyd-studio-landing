  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .error-code {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(120px, 20vw, 220px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -6px;
      color: transparent;
      -webkit-text-stroke: 1px rgba(244, 81, 30, 0.25);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }

    .error-content {
      position: relative;
      z-index: 1;
      max-width: 480px;
    }

    .error-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid rgba(244, 81, 30, 0.3);
      border-radius: 100px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: #F4511E;
      margin-bottom: 32px;
      letter-spacing: 0.05em;
    }

    .error-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #F4511E;
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .error-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 700;
      color: #F5F0EB;
      margin: 0 0 16px;
      line-height: 1.15;
    }

    .error-desc {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      color: rgba(245, 240, 235, 0.5);
      line-height: 1.6;
      margin: 0 0 40px;
    }

    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .error-actions .btn-secondary {
      font-size: 15px;
    }
  </style>
